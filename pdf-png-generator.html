<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF/PNG Generator — Richard & Gita</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{ --red:#9e0f22; --red2:#c8202f; --gold:#d4af37; --cream:#fbf4e6; }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{ font-family:'Inter',sans-serif; background:#1d1012; color:var(--cream);
    display:flex; flex-direction:column; align-items:center; padding:30px 16px; -webkit-font-smoothing:antialiased; }

  .controls{ width:100%; max-width:760px; background:rgba(255,255,255,.05);
    border:1px solid rgba(212,175,55,.25); border-radius:16px; padding:24px; margin-bottom:30px; }
  .controls h1{ font-family:'Playfair Display',serif; font-style:italic; color:var(--gold); font-size:1.5rem; margin-bottom:4px; }
  .controls p.sub{ font-size:13px; color:rgba(250,243,230,.5); margin-bottom:18px; line-height:1.6; }
  label{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:rgba(212,175,55,.6); display:block; margin:14px 0 6px; }
  input[type=url], textarea{ width:100%; padding:11px 14px; background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12); border-radius:9px; color:#faf3e6; font:14px 'Inter',sans-serif; outline:none; }
  input:focus, textarea:focus{ border-color:var(--gold); }
  textarea{ min-height:90px; resize:vertical; }
  .row2{ display:flex; gap:16px; flex-wrap:wrap; }
  .row2>div{ flex:1; min-width:240px; }
  .btns{ display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; align-items:center; }
  .btn{ padding:11px 24px; border:none; border-radius:50px; cursor:pointer;
    background:linear-gradient(135deg,#8b1c24,var(--red2)); color:#fff; font:600 13px 'Inter',sans-serif;
    letter-spacing:.12em; text-transform:uppercase; box-shadow:0 8px 26px rgba(200,32,47,.4); transition:.2s; }
  .btn:hover{ transform:translateY(-2px); }
  .btn.gold{ background:linear-gradient(135deg,#b8860b,#e5c22a); color:#1a0f0d; box-shadow:none; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
  .count{ font-size:13px; color:var(--gold); }
  .hint{ font-size:12px; color:rgba(250,243,230,.4); margin-top:6px; line-height:1.6; }

  #output{ display:none; background:rgba(255,255,255,.05); border:1px solid rgba(212,175,55,.2);
    border-radius:16px; padding:28px; margin-top:24px; max-width:760px; }
  .output-header{ margin-bottom:20px; }
  .output-header h2{ font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); }

  .gen-item{
    display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:10px; margin-bottom:12px;
  }
  .gen-name{ flex:1; font-size:13px; font-weight:500; color:#faf8f3; }
  .gen-btns{ display:flex; gap:8px; }
  .gen-btn{
    padding:6px 14px; font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    background:rgba(212,175,55,.12); border:1px solid rgba(212,175,55,.25); border-radius:20px;
    color:var(--gold); cursor:pointer; white-space:nowrap; transition:all .2s;
  }
  .gen-btn:hover{ background:rgba(212,175,55,.25); }
  .gen-btn.pdf{ background:rgba(156,15,34,.12); border-color:rgba(156,15,34,.25); color:#ff6b7a; }
  .gen-btn.pdf:hover{ background:rgba(156,15,34,.25); }

  .hidden-pages{ position:absolute; left:-9999px; top:0; }

  /* INVITATION STYLES */
  .page{ width:148mm; height:210mm; position:relative; overflow:hidden; page-break-after:always;
    background:radial-gradient(130% 90% at 70% -10%, #b3122b 0%, #8e0f22 55%, #6f0a18 100%); }
  .sheet{ width:100%; height:100%; position:relative; overflow:hidden; }
  .frame::before{ content:''; position:absolute; inset:5mm; border:1px solid rgba(212,175,55,.55); pointer-events:none; z-index:3; }
  .corner{position:absolute; width:9mm; height:9mm; border:1.5px solid var(--gold); pointer-events:none; z-index:3;}
  .corner.tl{top:6.4mm;left:6.4mm;border-right:0;border-bottom:0;}
  .corner.tr{top:6.4mm;right:6.4mm;border-left:0;border-bottom:0;}
  .corner.bl{bottom:6.4mm;left:6.4mm;border-right:0;border-top:0;}
  .corner.br{bottom:6.4mm;right:6.4mm;border-left:0;border-top:0;}

  .crest{ display:flex; align-items:center; justify-content:center; gap:1mm; }
  .dragon{ height:18mm; width:auto; flex:0 0 auto; filter:drop-shadow(0 .4mm .8mm rgba(0,0,0,.35)); }
  .dragon.right{ transform:scaleX(-1); }
  .xi-badge{ width:12mm; height:12mm; border-radius:50%; flex:0 0 12mm; display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif SC',serif; font-weight:700; font-size:14pt; color:var(--red);
    background:radial-gradient(circle at 34% 30%,#fff0a0 0%,#e5c22a 32%,#b8860b 70%,#7a5a00 100%);
    border:1px solid rgba(122,90,0,.6); box-shadow:0 2mm 5mm rgba(0,0,0,.35); }

  /* COVER */
  .cover{ display:flex; flex-direction:column; align-items:center; text-align:center; color:var(--cream); height:100%; }
  .cover-photo{ width:100%; height:98mm; position:relative; flex:0 0 98mm; overflow:hidden; }
  .cover-photo img{ width:100%; height:100%; object-fit:cover; object-position:51.3% 4.4%;
    transform:scale(1.85); transform-origin:51.3% 4.4%; display:block; }
  .cover-photo::after{ content:''; position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(110,10,24,.15) 0%, transparent 30%, transparent 60%, rgba(110,10,24,.95) 100%); }
  .cover-body{ flex:1; width:100%; padding:0 15mm 9mm; display:flex; flex-direction:column; align-items:center; margin-top:-9mm; position:relative; z-index:2; }
  .cover .crest{ margin-bottom:2.5mm; }
  .cover-label{ font-size:8pt; letter-spacing:.42em; text-transform:uppercase; color:var(--gold); margin-bottom:3.5mm; }
  .cover-quote{ font-family:'Playfair Display',serif; font-style:italic; font-size:9pt; line-height:1.55; color:rgba(251,244,230,.78); max-width:108mm; margin-bottom:5mm; }
  .cover-names{ font-family:'Playfair Display',serif; font-weight:600; font-size:30pt; line-height:1; color:#fff; }
  .cover-names .amp{ display:block; font-style:italic; font-weight:400; font-size:16pt; color:var(--gold); margin:.4mm 0; }
  .cover-han{ font-family:'Noto Serif SC',serif; font-size:11pt; color:var(--gold); letter-spacing:.2em; margin-top:2.5mm; }
  .cover-date{ font-size:8.5pt; letter-spacing:.18em; text-transform:uppercase; color:var(--cream); margin-top:3mm; }
  .cover-rule{ width:40mm; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:4mm 0; }
  .cover-to{ margin-top:auto; padding-top:6mm; }
  .cover-to .yth{ font-size:7pt; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); }
  .cover-to .nm{ font-family:'Playfair Display',serif; font-size:13pt; color:#fff; margin-top:1mm; }

  /* BACK — 2 kolom */
  .card{ display:flex; height:100%; }
  .photo-col{ flex:0 0 58mm; position:relative; overflow:hidden; background:#6f0a18; }
  .photo-col::before{ content:''; position:absolute; inset:0; z-index:0;
    background:url('assets/print-couple.jpg') center/cover; filter:blur(7px) brightness(.5) saturate(1.1); transform:scale(1.15); }
  .photo-col img{ position:relative; z-index:1; width:100%; height:100%; object-fit:cover; object-position:50% 20%; transform:scale(1.03); transform-origin:50% 20%; display:block; }
  .photo-col::after{ content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
    box-shadow: inset -2px 0 0 rgba(212,175,55,.9);
    background:linear-gradient(90deg, rgba(0,0,0,.18), transparent 16%, transparent 86%, rgba(110,10,24,.35)); }
  .content-col{ flex:1; position:relative; text-align:center; padding:11mm 9mm 26mm; display:flex; flex-direction:column; align-items:center; overflow:hidden; }
  .content-col .frame-in{ position:absolute; inset:5mm; border:1px solid rgba(212,175,55,.55); pointer-events:none; }
  .stack{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; width:100%;}
  .content-col .crest{ margin-bottom:3mm; }
  .invite-label{font-size:7pt; letter-spacing:.36em; text-transform:uppercase; color:rgba(251,244,230,.72); margin-bottom:2mm;}
  .names{font-family:'Playfair Display',serif; font-weight:600; font-size:23pt; line-height:1.02; color:#fff;}
  .names .amp{display:block; font-style:italic; font-weight:400; font-size:14pt; color:var(--gold); margin:.6mm 0;}
  .han{font-family:'Noto Serif SC',serif; font-size:9.5pt; color:var(--gold); letter-spacing:.16em; margin-top:2mm;}
  .rule{width:34mm; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:3.5mm 0;}
  .to{ font-size:7.6pt; line-height:1.5; color:rgba(251,244,230,.85); margin-bottom:3.5mm; }
  .to b{ display:block; color:#fff; font-size:9.5pt; font-weight:600; margin-top:.6mm; }
  .to .yth{ font-size:6.4pt; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); }
  .parents{font-size:7.4pt; line-height:1.4; color:rgba(251,244,230,.9); margin-bottom:1mm;}
  .parents .p-block{margin-bottom:2.5mm;}
  .parents .role{font-size:6.2pt; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:.4mm;}
  .parents strong{color:#fff; font-weight:600; font-size:7.8pt;}
  .han-sm{font-family:'Noto Serif SC',serif; color:var(--gold); font-size:7.6pt; white-space:nowrap;}
  .events{width:100%; display:flex; flex-direction:column; gap:3mm; margin:2.5mm 0;}
  .event{ border:1px solid rgba(212,175,55,.4); border-radius:2.5mm; padding:2.6mm 3mm; background:rgba(0,0,0,.16); }
  .event h3{font-family:'Playfair Display',serif; font-weight:600; font-size:10pt; color:var(--gold); margin-bottom:1mm;}
  .event .e-line{font-size:7.2pt; line-height:1.45; color:rgba(251,244,230,.92);}
  .event .e-strong{color:#fff; font-weight:600; display:block; font-size:7.6pt; margin-top:.6mm;}
  .footer{margin-top:1mm; display:flex; flex-direction:column; align-items:center; gap:1.6mm;}
  .qr{width:16mm; height:16mm; background:#fff; padding:1mm; border-radius:2mm;}
  .qr img,.qr canvas{width:100%!important; height:100%!important; display:block;}
  .qr-cap{font-size:6pt; letter-spacing:.16em; text-transform:uppercase; color:var(--gold);}

  @page{ size:148mm 210mm; margin:0; }
  @media print{
    html,body{ margin:0; padding:0; background:#6f0a18; display:block; }
    .controls{ display:none; }
    .page{ margin:0; }
    .sheet{ box-shadow:none; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  }
</style>
</head>
<body>

  <div class="controls">
    <h1>PDF/PNG Generator</h1>
    <p class="sub">Generate undangan per guest (2 halaman) dan download sebagai <b>PDF atau PNG</b>.</p>

    <label>URL Website (untuk QR personal)</label>
    <input type="url" id="base-url" value="https://wedding-richard-gita.vercel.app/" />

    <div class="row2">
      <div>
        <label>Keluarga (dengan Tea Pai · 1 per baris)</label>
        <textarea id="family-list" placeholder="Keluarga Ibu Kasmah&#10;Keluarga Ibu Lusiana&#10;..."></textarea>
        <p class="hint">👨‍👩‍👧‍👦 Schedule: Tea Pai 09.00–11.00 + Resepsi 11.00–15.00</p>
      </div>
      <div>
        <label>Tamu Undangan (tanpa Tea Pai · 1 per baris)</label>
        <textarea id="guest-list" placeholder="Budi Santoso&#10;Siti Rahayu&#10;..."></textarea>
        <p class="hint">✦ Schedule: Resepsi 11.00–15.00 only</p>
      </div>
    </div>

    <div class="btns">
      <button class="btn" onclick="generate()">✦ Generate Undangan</button>
      <span class="count" id="count"></span>
    </div>
  </div>

  <div id="output" class="card">
    <div class="output-header">
      <h2>Download Undangan (PDF atau PNG)</h2>
    </div>
    <div id="gen-list"></div>
  </div>

  <div class="hidden-pages" id="hidden-pages"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function readLines(id){ return document.getElementById(id).value.trim().split('\n').map(s=>s.trim()).filter(Boolean); }

  function coverPage(name, isFamily){
    const nm = isFamily
      ? `<div class="nm">${esc(name)}</div>`
      : `<div class="yth" style="margin-bottom:1mm">Bapak / Ibu / Saudara / i</div><div class="nm">${esc(name)}</div>`;
    return `<div class="page"><div class="sheet cover frame">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="cover-photo"><img src="assets/cover-art.jpg" alt=""></div>
      <div class="cover-body">
        <div class="crest"><img class="dragon left" src="assets/dragon.png" alt=""><div class="xi-badge">囍</div><img class="dragon right" src="assets/dragon.png" alt=""></div>
        <p class="cover-label">Undangan Pernikahan</p>
        <p class="cover-quote">"Dua insan yang dipersatukan oleh cinta dan restu,<br>melangkah bersama menuju satu kehidupan yang utuh."</p>
        <div class="cover-names">Richard<span class="amp">&amp;</span>Gita</div>
        <div class="cover-han">张文兴 · 甘美花</div>
        <p class="cover-date">26 &amp; 28 Juni 2026 · Samarinda &amp; Balikpapan</p>
        <div class="cover-rule"></div>
        <div class="cover-to"><div class="yth">Kepada Yth.</div>${nm}</div>
      </div>
    </div></div>`;
  }

  function backPage(name, isFamily){
    const url = document.getElementById('base-url').value.trim().replace(/\?.*$/, '') + '?to=' + encodeURIComponent(name);
    const teaPaiHtml = isFamily ? `<div class="event"><h3>Tea Pai</h3>
              <div class="e-line"><span class="e-strong">Minggu, 28 Juni 2026 · 09.00 – 11.00 WITA</span>
                <span class="e-strong">Nusantara Grand Ballroom</span>
                Hotel MaxOne, Jl. MT Haryono No.2, Balikpapan</div></div>` : '';
    return `<div class="page"><div class="sheet"><div class="card">
      <div class="photo-col"><img src="assets/print-couple.jpg" alt=""></div>
      <div class="content-col">
        <div class="frame-in"></div>
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <div class="stack">
          <div class="crest"><img class="dragon left" src="assets/dragon.png" alt=""><div class="xi-badge">囍</div><img class="dragon right" src="assets/dragon.png" alt=""></div>
          <p class="invite-label">The Wedding Of</p>
          <div class="names">Richard<span class="amp">&amp;</span>Gita</div>
          <div class="han">张文兴 · 甘美花</div>
          <div class="rule"></div>
          <p class="to"><span class="yth">Kepada Yth.</span><b>${esc(name)}</b></p>
          <div class="parents">
            <div class="p-block"><span class="role">Mempelai Pria</span>
              Putra dari <strong>Bp. Jack Chandra Wijaya</strong> <span class="han-sm">张人强</span> &amp; <strong>Ibu Kasmah</strong></div>
            <div class="p-block"><span class="role">Mempelai Wanita</span>
              Putri dari <strong>Bp. Alm. Andry Martin</strong> <span class="han-sm">甘坤同</span> &amp; <strong>Ibu Lusiana</strong></div>
          </div>
          <div class="events">
            <div class="event"><h3>Akad &amp; Acara Adat</h3>
              <div class="e-line"><span class="e-strong">Jumat, 26 Juni 2026</span>
                09.00 – 18.00 WITA
                <span class="e-strong">Kediaman Mempelai Wanita</span>
                Jl. Samarinda Sanga-Sanga RT 17, Kel. Bukuan, Kec. Palaran, Samarinda</div></div>
            ${teaPaiHtml}
            <div class="event"><h3>Resepsi</h3>
              <div class="e-line"><span class="e-strong">Minggu, 28 Juni 2026 · 11.00 – 15.00 WITA</span>
                <span class="e-strong">Nusantara Grand Ballroom</span>
                Hotel MaxOne, Jl. MT Haryono No.2, Balikpapan</div></div>
          </div>
          <div class="footer"><div class="qr" data-url="${esc(url)}"></div><span class="qr-cap">Scan · Undangan Digital</span></div>
        </div>
      </div>
    </div></div></div>`;
  }

  function generate(){
    const family = readLines('family-list');
    const guests = readLines('guest-list');
    const all = [...family.map(n => ({name:n, isFamily:true})), ...guests.map(n => ({name:n, isFamily:false}))];

    if(!all.length){ alert('Masukkan minimal 1 nama tamu atau keluarga!'); return; }

    // Generate hidden HTML pages
    const pagesHtml = all.map(e => coverPage(e.name, e.isFamily) + backPage(e.name, e.isFamily)).join('');
    document.getElementById('hidden-pages').innerHTML = pagesHtml;

    // Generate QR codes — render to canvas, then convert to <img> data URL
    // (html2canvas chokes on live canvas elements → "createPattern ... width or height of 0")
    document.querySelectorAll('.qr').forEach(el=>{
      const u = el.dataset.url;
      try{
        const tmp = document.createElement('div');
        new QRCode(tmp,{text:u,width:200,height:200,colorDark:'#1d1012',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
        const cv = tmp.querySelector('canvas');
        const dataUrl = cv ? cv.toDataURL('image/png') : null;
        el.innerHTML = dataUrl
          ? '<img src="'+dataUrl+'" alt="QR">'
          : '<img crossorigin="anonymous" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(u)+'">';
      }
      catch(err){ el.innerHTML = '<img crossorigin="anonymous" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(u)+'">'; }
    });

    // Generate output list
    const list = document.getElementById('gen-list');
    list.innerHTML = '';
    all.forEach(entry => {
      const item = document.createElement('div');
      item.className = 'gen-item';
      const safeName = entry.name.replace(/\s+/g, '-').toLowerCase();
      const safe = entry.name.replace(/'/g, "\\'");
      item.innerHTML = `
        <div class="gen-name">${entry.name}</div>
        <div class="gen-btns">
          <button class="gen-btn pdf" onclick="downloadPDF('${safe}', this)">📄 PDF</button>
          <button class="gen-btn" onclick="downloadPNG('${safe}', this)">🖼 PNG</button>
        </div>
      `;
      list.appendChild(item);
    });

    document.getElementById('output').style.display = 'block';
    document.getElementById('count').textContent = all.length + ' undangan siap download';
  }

  function findPages(name) {
    const out = [];
    document.querySelectorAll('.page').forEach(page => {
      const text = page.querySelector('.cover-to .nm, .to b');
      if (text && text.textContent.trim() === name) out.push(page);
    });
    return out;
  }

  function setBtnBusy(btn, busy, busyLabel) {
    if (!btn) return;
    if (busy) {
      btn.dataset.label = btn.textContent;
      btn.textContent = busyLabel;
      btn.disabled = true;
      btn.style.opacity = '.6';
    } else {
      btn.textContent = btn.dataset.label || btn.textContent;
      btn.disabled = false;
      btn.style.opacity = '';
    }
  }

  async function downloadPDF(name, btn) {
    const pdfPages = findPages(name);
    if (pdfPages.length === 0) { alert('Halaman tidak ditemukan'); return; }

    setBtnBusy(btn, true, '⏳ Membuat...');
    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5', compress: true });
      const pageW = 148, pageH = 210;

      for (let i = 0; i < pdfPages.length; i++) {
        const canvas = await html2canvas(pdfPages[i], {
          scale: 3, useCORS: true, allowTaint: false, backgroundColor: '#6f0a18'
        });
        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        if (i > 0) pdf.addPage('a5', 'portrait');
        pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH);
      }
      pdf.save(`undangan-${name.replace(/\s+/g, '-')}.pdf`);
    } catch (e) {
      alert('Gagal membuat PDF: ' + e.message);
    } finally {
      setBtnBusy(btn, false);
    }
  }

  async function downloadPNG(name, btn) {
    const pdfPages = findPages(name);
    if (pdfPages.length === 0) { alert('Halaman tidak ditemukan'); return; }

    setBtnBusy(btn, true, '⏳ Membuat...');
    try {
      for (let i = 0; i < pdfPages.length; i++) {
        const canvas = await html2canvas(pdfPages[i], {
          scale: 3, useCORS: true, allowTaint: false, backgroundColor: '#6f0a18'
        });
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `undangan-${name.replace(/\s+/g, '-')}-halaman-${i+1}.png`;
        link.click();
        if (i < pdfPages.length - 1) await new Promise(r => setTimeout(r, 500));
      }
    } catch (e) {
      alert('Gagal membuat PNG: ' + e.message);
    } finally {
      setBtnBusy(btn, false);
    }
  }
</script>

</body>
</html>
