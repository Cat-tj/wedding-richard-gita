<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<title>PNG Generator — Richard & Gita</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Noto+Serif+SC:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root{ --red:#9e0f22; --gold:#d4af37; --cream:#fbf4e6; --dark:#6f0a18; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  body{ font-family:'Inter',sans-serif; background:#1d1012; color:#faf3e6; padding:40px 24px; }
  h1{ font-family:'Playfair Display',serif; font-size:2rem; color:var(--gold); margin-bottom:8px; }
  .sub{ font-size:13px; color:rgba(250,248,243,.45); margin-bottom:40px; line-height:1.7; }

  .card{
    background:rgba(255,255,255,.05); border:1px solid rgba(212,175,55,.2);
    border-radius:16px; padding:28px; margin-bottom:24px; max-width:860px;
  }
  .card h2{ font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }

  label{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:rgba(212,175,55,.6); display:block; margin-bottom:8px; }
  textarea{
    width:100%; padding:12px 16px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
    border-radius:10px; color:#faf8f3; font-family:'Inter',sans-serif; font-size:14px; outline:none;
    resize:vertical; min-height:140px;
  }
  textarea:focus{ border-color:var(--gold); }

  .hint{ font-size:12px; color:rgba(250,248,243,.35); margin-top:8px; line-height:1.6; }

  button{
    padding:12px 32px; background:linear-gradient(135deg,#8b1c24,#c8202f);
    color:#faf8f3; border:none; border-radius:10px;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; cursor:pointer; margin-top:20px; transition:all .25s ease;
  }
  button:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(200,32,47,.4); }
  button:disabled{ opacity:.5; cursor:not-allowed; }

  #output{ display:none; background:rgba(255,255,255,.05); border:1px solid rgba(212,175,55,.2);
    border-radius:16px; padding:28px; margin-top:24px; max-width:860px; }
  .output-header{ margin-bottom:16px; }
  .output-header h2{ font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); }

  .gen-item{
    display:flex; align-items:center; gap:16px; padding:14px; background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07); border-radius:10px; margin-bottom:12px;
  }
  .gen-name{ flex:1; font-size:13px; font-weight:500; color:#faf8f3; }
  .gen-btn{
    padding:6px 18px; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    background:rgba(212,175,55,.12); border:1px solid rgba(212,175,55,.25); border-radius:20px;
    color:var(--gold); cursor:pointer; white-space:nowrap; transition:all .2s;
  }
  .gen-btn:hover{ background:rgba(212,175,55,.25); }
  .gen-btn.done{ background:rgba(37,211,102,.15); border-color:rgba(37,211,102,.3); color:#25d366; }

  .hidden{ position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden; }
</style>
</head>
<body>

<h1>🖼 PNG Generator</h1>
<p class="sub">Download undangan per guest sebagai 2 halaman PNG (depan + belakang). Setiap tamu mendapat kartu dengan nama mereka + QR code personal.</p>

<div class="card">
  <h2>Pengaturan</h2>
  <div style="margin-bottom:20px">
    <label>Keluarga (dengan Tea Pai · 1 nama per baris)</label>
    <textarea id="family-list" placeholder="Keluarga Ibu Kasmah&#10;Keluarga Ibu Lusiana&#10;..."></textarea>
    <p class="hint">👨‍👩‍👧‍👦 Schedule: Tea Pai 09.00–11.00 + Resepsi 11.00–15.00</p>
  </div>
  <div style="margin-bottom:20px">
    <label>Tamu Undangan (tanpa Tea Pai · 1 nama per baris)</label>
    <textarea id="guest-list" placeholder="Budi Santoso&#10;Siti Rahayu&#10;..."></textarea>
    <p class="hint">✦ Schedule: Resepsi 11.00–15.00 only</p>
  </div>
  <button onclick="generate()">✦ Generate PNG</button>
</div>

<div id="output" class="card">
  <div class="output-header">
    <h2>Undangan PNG Siap Download</h2>
  </div>
  <div id="gen-list"></div>
</div>

<canvas id="canvas" class="hidden" width="1480" height="2100"></canvas>

<script>
const SITE = 'https://wedding-richard-gita.vercel.app/';

function readLines(id) {
  return document.getElementById(id).value.trim().split('\n').map(n => n.trim()).filter(Boolean);
}

function drawFrontPage(ctx, name, isFamily) {
  const w = 1480, h = 2100;
  const pad = 80;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#b3122b');
  grad.addColorStop(0.5, '#8e0f22');
  grad.addColorStop(1, '#6f0a18');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Frame borders
  ctx.strokeStyle = 'rgba(212,175,55,0.55)';
  ctx.lineWidth = 3;
  ctx.strokeRect(pad, pad, w - 2*pad, h - 2*pad);

  // Corner brackets (simplified as small L-shapes)
  ctx.strokeStyle = 'rgba(212,175,55,0.9)';
  ctx.lineWidth = 2.5;
  const cornerSize = 30;
  // Top-left
  ctx.beginPath();
  ctx.moveTo(pad+5, pad+cornerSize+5);
  ctx.lineTo(pad+5, pad+5);
  ctx.lineTo(pad+cornerSize+5, pad+5);
  ctx.stroke();
  // Top-right
  ctx.beginPath();
  ctx.moveTo(w-pad-cornerSize-5, pad+5);
  ctx.lineTo(w-pad-5, pad+5);
  ctx.lineTo(w-pad-5, pad+cornerSize+5);
  ctx.stroke();
  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(pad+5, h-pad-cornerSize-5);
  ctx.lineTo(pad+5, h-pad-5);
  ctx.lineTo(pad+cornerSize+5, h-pad-5);
  ctx.stroke();
  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(w-pad-cornerSize-5, h-pad-5);
  ctx.lineTo(w-pad-5, h-pad-5);
  ctx.lineTo(w-pad-5, h-pad-cornerSize-5);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fbf4e6';

  // Label
  ctx.font = 'bold 26px "Inter"';
  ctx.fillStyle = 'rgba(212,175,55,0.8)';
  ctx.fillText('Undangan Pernikahan', w/2, 200);

  // Quote
  ctx.font = 'italic 24px "Playfair Display"';
  ctx.fillStyle = 'rgba(251,244,230,0.75)';
  const quote = '"Dua insan yang dipersatukan oleh cinta\ndan restu, melangkah bersama menuju\nsatu kehidupan yang utuh."';
  let y = 290;
  quote.split('\n').forEach(line => {
    ctx.fillText(line, w/2, y);
    y += 45;
  });

  // Divider line
  ctx.strokeStyle = 'rgba(212,175,55,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w/2 - 250, 500);
  ctx.lineTo(w/2 + 250, 500);
  ctx.stroke();

  // Names
  ctx.font = 'bold 110px "Playfair Display"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Richard', w/2, 680);

  ctx.font = 'italic 60px "Playfair Display"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('&', w/2, 800);

  ctx.font = 'bold 110px "Playfair Display"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Gita', w/2, 950);

  // Chinese names
  ctx.font = 'bold 36px "Noto Serif SC"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('张文兴 · 甘美花', w/2, 1050);

  // Date & Location
  ctx.font = '24px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.8)';
  ctx.fillText('26 & 28 Juni 2026', w/2, 1130);
  ctx.fillText('Samarinda & Balikpapan, Indonesia', w/2, 1180);

  // Divider line
  ctx.strokeStyle = 'rgba(212,175,55,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w/2 - 250, 1260);
  ctx.lineTo(w/2 + 250, 1260);
  ctx.stroke();

  // Guest label & name
  ctx.font = 'bold 20px "Inter"';
  ctx.fillStyle = '#d4af37';
  ctx.textAlign = 'center';
  ctx.fillText('KEPADA YTH.', w/2, 1350);

  ctx.font = 'bold 60px "Playfair Display"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(name, w/2, 1480);

  // Schedule section
  ctx.font = 'bold 22px "Inter"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('ACARA', w/2, 1600);

  ctx.font = '26px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.9)';
  const schedule = isFamily
    ? 'Tea Pai: 09.00 – 11.00 WITA\nResepsi: 11.00 – 15.00 WITA'
    : 'Resepsi: 11.00 – 15.00 WITA';
  y = 1680;
  schedule.split('\n').forEach(line => {
    ctx.fillText(line, w/2, y);
    y += 50;
  });

  ctx.font = '22px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.75)';
  ctx.fillText('Minggu, 28 Juni 2026', w/2, y + 30);
}

function drawBackPage(ctx, name, isFamily) {
  const w = 1480, h = 2100;
  const pad = 80;
  const colW = 860; // Left column width (photo area)

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#b3122b');
  grad.addColorStop(0.5, '#8e0f22');
  grad.addColorStop(1, '#6f0a18');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Frame borders
  ctx.strokeStyle = 'rgba(212,175,55,0.55)';
  ctx.lineWidth = 3;
  ctx.strokeRect(pad, pad, w - 2*pad, h - 2*pad);

  // Corner brackets
  ctx.strokeStyle = 'rgba(212,175,55,0.9)';
  ctx.lineWidth = 2.5;
  const cornerSize = 30;
  ctx.beginPath();
  ctx.moveTo(pad+5, pad+cornerSize+5);
  ctx.lineTo(pad+5, pad+5);
  ctx.lineTo(pad+cornerSize+5, pad+5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w-pad-cornerSize-5, pad+5);
  ctx.lineTo(w-pad-5, pad+5);
  ctx.lineTo(w-pad-5, pad+cornerSize+5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pad+5, h-pad-cornerSize-5);
  ctx.lineTo(pad+5, h-pad-5);
  ctx.lineTo(pad+cornerSize+5, h-pad-5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w-pad-cornerSize-5, h-pad-5);
  ctx.lineTo(w-pad-5, h-pad-5);
  ctx.lineTo(w-pad-5, h-pad-cornerSize-5);
  ctx.stroke();

  // LEFT COLUMN - Photo placeholder
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(pad+20, pad+20, 430, h - 2*pad - 40);

  // RIGHT COLUMN - Content
  const contentX = pad + 480;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fbf4e6';

  // Title
  ctx.font = 'bold 24px "Inter"';
  ctx.fillStyle = 'rgba(212,175,55,0.8)';
  ctx.fillText('THE WEDDING OF', w/2, 150);

  // Names (smaller for space)
  ctx.font = 'bold 70px "Playfair Display"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Richard', w/2, 280);
  ctx.font = 'italic 40px "Playfair Display"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('&', w/2, 350);
  ctx.font = 'bold 70px "Playfair Display"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Gita', w/2, 430);

  // Chinese names
  ctx.font = 'bold 26px "Noto Serif SC"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('张文兴 · 甘美花', w/2, 490);

  // Divider line
  ctx.strokeStyle = 'rgba(212,175,55,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(contentX+50, 530);
  ctx.lineTo(w-pad-50, 530);
  ctx.stroke();

  // Greeting
  ctx.font = 'bold 18px "Inter"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('Kepada Yth.', w/2, 600);

  ctx.font = 'bold 32px "Playfair Display"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(name, w/2, 660);

  // Invitation text
  ctx.font = '18px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.85)';
  const intro = `Dengan memohon rahmat Tuhan Yang Maha Esa,\nkami mengundang Bapak/Ibu/Saudara/i\nuntuk hadir & memberikan doa restu.`;
  let y = 750;
  intro.split('\n').forEach(line => {
    ctx.fillText(line, w/2, y);
    y += 30;
  });

  // Parents section
  y = 920;
  ctx.font = 'bold 16px "Inter"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('MEMPELAI PRIA', w/2, y);
  ctx.font = '15px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.85)';
  ctx.fillText('Putra dari Bp. Jack Chandra Wijaya (张人强)', w/2, y + 30);
  ctx.fillText('& Ibu Kasmah', w/2, y + 55);

  y = 1070;
  ctx.font = 'bold 16px "Inter"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('MEMPELAI WANITA', w/2, y);
  ctx.font = '15px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.85)';
  ctx.fillText('Putri dari Bp. Alm. Andry Martin (甘坤同)', w/2, y + 30);
  ctx.fillText('& Ibu Lusiana', w/2, y + 55);

  // Events section
  y = 1240;
  ctx.font = 'bold 18px "Inter"';
  ctx.fillStyle = '#d4af37';
  ctx.fillText('ACARA PERNIKAHAN', w/2, y);

  y += 60;
  ctx.font = 'bold 16px "Inter"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Akad Nikah', w/2, y);
  ctx.font = '14px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.85)';
  ctx.fillText('Jumat, 26 Juni 2026 · 09.00 – 12.00 WITA', w/2, y + 28);

  if (isFamily) {
    y += 75;
    ctx.font = 'bold 16px "Inter"';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Tea Pai', w/2, y);
    ctx.font = '14px "Inter"';
    ctx.fillStyle = 'rgba(251,244,230,0.85)';
    ctx.fillText('Minggu, 28 Juni 2026 · 09.00 – 11.00 WITA', w/2, y + 28);
  }

  y += 75;
  ctx.font = 'bold 16px "Inter"';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Resepsi', w/2, y);
  ctx.font = '14px "Inter"';
  ctx.fillStyle = 'rgba(251,244,230,0.85)';
  ctx.fillText('Minggu, 28 Juni 2026 · 11.00 – 15.00 WITA', w/2, y + 28);

  // QR placeholder
  y = h - 200;
  ctx.font = '14px "Inter"';
  ctx.fillStyle = 'rgba(212,175,55,0.6)';
  ctx.fillText('[ QR Code akan ditambahkan ]', w/2, y);
}

function generate() {
  const family = readLines('family-list');
  const guests = readLines('guest-list');
  const all = [...family.map(n => ({name: n, isFamily: true})), ...guests.map(n => ({name: n, isFamily: false}))];

  if (!all.length) { alert('Masukkan minimal 1 nama!'); return; }

  const output = document.getElementById('output');
  const list = document.getElementById('gen-list');
  list.innerHTML = '';
  output.style.display = 'block';

  all.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'gen-item';
    item.innerHTML = `<div class="gen-name">${entry.name}</div><button class="gen-btn" onclick="downloadPNG('${entry.name}', ${entry.isFamily})">Download 2 Pages</button>`;
    list.appendChild(item);
  });
}

function downloadPNG(name, isFamily) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Page 1 - Front
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawFrontPage(ctx, name, isFamily);
  const page1 = canvas.toDataURL('image/png');

  // Page 2 - Back
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackPage(ctx, name, isFamily);
  const page2 = canvas.toDataURL('image/png');

  // Download both
  const downloadImg = (data, filename) => {
    const a = document.createElement('a');
    a.href = data;
    a.download = filename;
    a.click();
  };

  downloadImg(page1, `undangan-${name.replace(/\s+/g, '-')}-halaman-1.png`);
  setTimeout(() => {
    downloadImg(page2, `undangan-${name.replace(/\s+/g, '-')}-halaman-2.png`);
  }, 500);
}
</script>

</body>
</html>
