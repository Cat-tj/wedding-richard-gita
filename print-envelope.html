<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<title>Amplop — Richard &amp; Gita</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Noto+Serif+SC:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root{ --red:#9e0f22; --gold:#d4af37; --cream:#fbf4e6; --dark:#6f0a18; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  body{ font-family:'Inter',sans-serif; background:#1d1012; display:flex; flex-direction:column;
    align-items:center; padding:30px 16px; gap:20px; }

  .toolbar{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:center;
    margin-bottom:10px; color:#faf3e6; max-width:700px; text-align:center; }
  .toolbar p{ font-size:12px; color:rgba(250,243,230,.5); line-height:1.6; }
  .btn{ padding:10px 24px; border:none; border-radius:50px; cursor:pointer;
    background:linear-gradient(135deg,#8b1c24,#c8202f); color:#fff;
    font:600 13px 'Inter',sans-serif; letter-spacing:.14em; text-transform:uppercase;
    box-shadow:0 8px 26px rgba(200,32,47,.4); }

  /* ── AMPLOP C5: 162 × 229 mm ── */
  .envelope{
    width:162mm; height:229mm; position:relative; overflow:hidden;
    background:
      radial-gradient(120% 80% at 50% 0%, #a81226 0%, #8e0f22 50%, #6f0a18 100%);
    box-shadow:0 24px 60px rgba(0,0,0,.6);
  }

  /* bingkai emas ganda */
  .frame-outer{ position:absolute; inset:7mm; border:1px solid rgba(212,175,55,.55);
    pointer-events:none; z-index:4; }
  .frame-inner{ position:absolute; inset:9.5mm; border:.5px solid rgba(212,175,55,.25);
    pointer-events:none; z-index:4; }
  .corner{ position:absolute; width:10mm; height:10mm; border:1.5px solid var(--gold); z-index:5; }
  .corner.tl{ top:8.5mm; left:8.5mm; border-right:0; border-bottom:0; }
  .corner.tr{ top:8.5mm; right:8.5mm; border-left:0; border-bottom:0; }
  .corner.bl{ bottom:8.5mm; left:8.5mm; border-right:0; border-top:0; }
  .corner.br{ bottom:8.5mm; right:8.5mm; border-left:0; border-top:0; }

  /* konten — komposisi tengah, banyak ruang napas */
  .content{
    position:absolute; inset:0; z-index:6;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24mm 18mm; text-align:center; color:var(--cream);
  }

  .crest{ display:flex; align-items:center; justify-content:center; gap:2mm; margin-bottom:8mm; }
  .dragon{ height:16mm; width:auto; filter:drop-shadow(0 1mm 2mm rgba(0,0,0,.4)); }
  .dragon.r{ transform:scaleX(-1); }
  .xi{ font-family:'Noto Serif SC',serif; font-weight:700; font-size:20pt; color:var(--gold);
    line-height:1; margin:0 1mm; }

  .label{ font-size:7.5pt; letter-spacing:.46em; text-transform:uppercase;
    color:var(--gold); margin-bottom:7mm; }

  .names{ font-family:'Playfair Display',serif; font-weight:600; font-size:30pt;
    line-height:1.05; color:#fff; }
  .amp{ display:block; font-style:italic; font-weight:400; font-size:16pt;
    color:var(--gold); margin:1mm 0; }
  .han{ font-family:'Noto Serif SC',serif; font-size:10.5pt; color:var(--gold);
    letter-spacing:.22em; margin-top:4mm; }

  .rule{ width:44mm; height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:9mm auto; }

  .date{ font-size:8pt; letter-spacing:.24em; text-transform:uppercase;
    color:rgba(251,244,230,.75); }

  .to{ margin-top:14mm; }
  .to-label{ font-size:7pt; letter-spacing:.34em; text-transform:uppercase;
    color:var(--gold); margin-bottom:3mm; }
  .to-name{ font-family:'Playfair Display',serif; font-size:13pt; color:#fff;
    border-bottom:.5px solid rgba(212,175,55,.45);
    min-width:86mm; padding:0 6mm 2.5mm; display:inline-block; min-height:9mm; }

  @page{ size:162mm 229mm; margin:0; }
  @media print{
    html,body{ margin:0; padding:0; background:#6f0a18; display:block; }
    .toolbar{ display:none; }
    .envelope{ box-shadow:none; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn" onclick="window.print()">🖨 Cetak Amplop</button>
  <p>Ukuran C5 (162×229mm) — muat kartu undangan A5.<br>
     Set paper C5, margins none, scale 100%, background graphics ON.</p>
</div>

<div class="envelope">

  <div class="frame-outer"></div>
  <div class="frame-inner"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="crest">
      <img class="dragon" src="assets/dragon.png" alt=""/>
      <span class="xi">囍</span>
      <img class="dragon r" src="assets/dragon.png" alt=""/>
    </div>

    <div class="label">Undangan Pernikahan</div>

    <div class="names">Richard<span class="amp">&amp;</span>Gita</div>
    <div class="han">张文兴 · 甘美花</div>

    <div class="rule"></div>

    <div class="date">26 &amp; 28 Juni 2026 · Samarinda &amp; Balikpapan</div>

    <div class="to">
      <div class="to-label">Kepada Yth.</div>
      <div class="to-name">&nbsp;</div>
    </div>
  </div>

</div>

</body>
</html>
